services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - chroma_data:/app/chroma_data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  chroma_data:
